<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="validacao.css">
</head>
<body>
    <div class="container">
        <h2>Criar Conta</h2>
        <div class="erro"></div>
        <input type="email" id="email" placeholder="Digite seu email"/>
        <input type="password" id="senha" placeholder="Digite sua senha (minimo 6 caracteres)"/>
        <input type="password" id="confirmar" placeholder="Confirme sua senha"/>
        <button onclick="validarFormulario()">Cadastrar</button>
        <div class="sucesso" id="sucesso"></div>
    </div>
    
    <script src="validacao.js"></script>
</body>
</html>
